name: Build and deploy ASP.Net Core app to Azure Web App - Items-API-

on:
  push:
    branches:
      - deploy-items-api
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build Items-API/Items-API.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish Items-API/Items-API.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E251C2B20AF643ACAB91FFA5D8200C5B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9E0331AA2EE6495EA1B30190299F4860 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EEA84005C857439B82CF2B0F795761A5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Items-API'
          slot-name: 'Production'
          package: .